<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Sinh Viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h2 class="mb-4">Danh Sách Sinh Viên</h2>

<div class="d-flex justify-content-between mb-3">
    <a th:href="@{/students/add}" class="btn btn-success">Thêm Mới Sinh Viên</a>
    <form th:action="@{/students}" method="get" class="d-flex">
        <input type="text" name="name" class="form-control me-2" placeholder="Tìm kiếm theo tên..." th:value="${param.name}">
        <button type="submit" class="btn btn-primary">Tìm</button>
    </form>
</div>

<table class="table table-bordered table-hover shadow-sm align-middle">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Ảnh</th>
        <th>Tên Sinh Viên</th>
        <th>Giới Tính</th>
        <th>Ngày Sinh</th>
        <th>Địa Chỉ</th>
        <th>Số Điện Thoại</th>
        <th>Hành Động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="st : ${students}">
        <td th:text="${st.studentId}"></td>
        <td>
            <img th:if="${st.imageUrl != null}" th:src="${st.imageUrl}" width="60" height="60" style="object-fit: cover; border-radius: 5px;">
        </td>
        <td th:text="${st.studentName}"></td>
        <td>
            <span th:if="${st.sex}" class="badge bg-info text-dark">Nam</span>
            <span th:unless="${st.sex}" class="badge bg-warning text-dark">Nữ</span>
        </td>
        <td th:text="${st.birthday}"></td>
        <td th:text="${st.address}"></td>
        <td th:text="${st.phoneNumber}"></td>
        <td>
            <a th:href="@{/students/edit/{id}(id=${st.studentId})}" class="btn btn-warning btn-sm">Sửa</a>
            <a th:href="@{/students/delete/{id}(id=${st.studentId})}" class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc chắn muốn xóa sinh viên này?')">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>
<div th:if="${#lists.isEmpty(students)}" class="alert alert-warning text-center">
    Không tìm thấy sinh viên nào!
</div>
</body>
</html>
