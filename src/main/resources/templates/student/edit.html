<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa Sinh Viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<div class="card shadow w-50 mx-auto">
    <div class="card-header bg-warning text-dark">
        <h3 class="mb-0">Cập Nhật Thông Tin Sinh Viên</h3>
    </div>
    <div class="card-body">
        <form th:action="@{/students/edit/{id}(id=${studentId})}" th:object="${student}" method="post" enctype="multipart/form-data" novalidate>

            <div class="mb-3">
                <label class="form-label fw-bold">Tên sinh viên:</label>
                <input type="text" th:field="*{studentName}" class="form-control" th:classappend="${#fields.hasErrors('studentName')} ? 'is-invalid' : ''">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('studentName')}" th:errors="*{studentName}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Giới tính:</label>
                <select th:field="*{sex}" class="form-select">
                    <option th:value="true">Nam</option>
                    <option th:value="false">Nữ</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Ngày sinh:</label>
                <input type="date" th:field="*{birthday}" class="form-control" th:classappend="${#fields.hasErrors('birthday')} ? 'is-invalid' : ''">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('birthday')}" th:errors="*{birthday}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Địa chỉ:</label>
                <input type="text" th:field="*{address}" class="form-control" th:classappend="${#fields.hasErrors('address')} ? 'is-invalid' : ''">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Số điện thoại:</label>
                <input type="text" th:field="*{phoneNumber}" class="form-control" th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid' : ''">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Ảnh hiện tại:</label>
                <div th:if="${currentImage != null}">
                    <img th:src="${currentImage}" width="120" class="mb-2 border rounded">
                </div>
                <input type="file" name="image" class="form-control" accept="image/*">
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-warning">Cập Nhật</button>
                <a th:href="@{/students}" class="btn btn-secondary">Quay Lại</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
